services:
  neo4j:
    image: neo4j:5.26-community
    container_name: hybridrag-neo4j
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g

      # Advanced Optimize Vector Search
      - NEO4J_server_jvm_additional=--add-modules jdk.incubator.vector
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - hybridrag-network

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: hybridrag-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    restart: unless-stopped
    networks:
      - hybridrag-network

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: hybridrag-api
    env_file:
      - .env
    ports:
      - "2206:2206"
    environment:
      # API Configuration
      - API_URL=http://host.docker.internal:5000/v1/
      - API_KEY=${API_KEY}

      # Models Configuration
      - LLM_MODEL=${LLM_MODEL}
      - HF_TOKEN=${HF_TOKEN:-}

      # Neo4j Configuration
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}

      # Qdrant Configuration
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-hybridrag_chunks}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - fastembed_cache:/app/.fastembed_cache
    networks:
      - hybridrag-network

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: hybridrag-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - hybridrag-network

networks:
  hybridrag-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  fastembed_cache:
